AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CloudVault AI Backend Infrastructure

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        UPLOAD_BUCKET: !Ref StorageBucket
        FILE_TABLE: !Ref FileMetadataTable

Resources:
  # ─── Cognito User Pool (Phase 6) ───────────────────────────────────────────
  CloudVaultUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: CloudVaultUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  # Cognito User Pool Client — no secret (required for browser JS clients)
  CloudVaultUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CloudVaultUserPool
      ClientName: CloudVaultWebClient
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # ─── HTTP API with CORS + Cognito JWT Authorizer ────────────────────────────
  CloudVaultApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CloudVaultUserPool}"
              audience:
                - !Ref CloudVaultUserPoolClient
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  # ─── Storage Bucket ─────────────────────────────────────────────────────────
  StorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cloudvault-ai-storage-${AWS::AccountId}-${AWS::Region}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - GET
              - POST
            AllowedOrigins:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000

  # ─── DynamoDB Table ─────────────────────────────────────────────────────────
  FileMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "CloudVaultFiles"
      AttributeDefinitions:
        - AttributeName: "userId"
          AttributeType: "S"
        - AttributeName: "fileId"
          AttributeType: "S"
        - AttributeName: "sharingId"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "userId"
          KeyType: "HASH"
        - AttributeName: "fileId"
          KeyType: "RANGE"
      GlobalSecondaryIndexes:
        - IndexName: "SharingIndex"
          KeySchema:
            - AttributeName: "sharingId"
              KeyType: "HASH"
          Projection:
            ProjectionType: "ALL"
      BillingMode: PAY_PER_REQUEST

  # ─── Lambda: Get Upload URL (Phase 1) ───────────────────────────────────────
  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/getUploadUrl.handler
      Policies:
        - S3WritePolicy:
            BucketName: !Ref StorageBucket
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files/upload-url
            Method: POST

  # ─── Lambda: Confirm Upload (Phase 3) ───────────────────────────────────────
  ConfirmUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/confirmUpload.handler
      Environment:
        Variables:
          ANALYZE_FUNCTION: !Ref AnalyzeImageFunction
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
        - LambdaInvokePolicy:
            FunctionName: !Ref AnalyzeImageFunction
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files/confirm
            Method: POST

  # ─── Lambda: Analyze Image (Phase 10) ───────────────────────────────────────
  AnalyzeImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/analyzeImage.handler
      Policies:
        - RekognitionDetectOnlyPolicy: {}
        - S3ReadPolicy:
            BucketName: !Ref StorageBucket
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files/{fileId}/analyze
            Method: POST



  # ─── Lambda: List Files (Phase 3) ───────────────────────────────────────────
  ListFilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/listFiles.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files
            Method: GET

  # ─── Lambda: Delete File (Phase 4) ──────────────────────────────────────────
  DeleteFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/deleteFile.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
        - S3ReadPolicy:
            BucketName: !Ref StorageBucket
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${StorageBucket}/*"
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files/{fileId}
            Method: DELETE

  # ─── Lambda: Get File URL (Phase 4) ─────────────────────────────────────────
  GetFileUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/getFileUrl.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - S3ReadPolicy:
            BucketName: !Ref StorageBucket
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files/{fileId}/url
            Method: GET

  # ─── Lambda: User Stats (Phase 7) ───────────────────────────────────────────
  UserStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/userStats.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files/stats
            Method: GET

  # ─── Lambda: Admin Stats (Phase 9) ──────────────────────────────────────────
  AdminStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminStats.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/stats
            Method: GET


  # ─── Lambda: Toggle Sharing (Phase 7) ───────────────────────────────────────
  ToggleSharingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/toggleSharing.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files/sharing
            Method: POST

  # ─── Lambda: Get Public File URL (Phase 7) ──────────────────────────────────
  GetPublicFileUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/getPublicFileUrl.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - S3ReadPolicy:
            BucketName: !Ref StorageBucket
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /s/{sharingId}
            Method: GET
            Auth:
              Authorizer: NONE

  # ─── Lambda: Update Tags (Phase 10) ──────────────────────────────────────────
  UpdateTagsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/updateTags.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /files/{fileId}/tags
            Method: PATCH

  # ─── Lambda: Admin List Moderation (Phase 10) ────────────────────────────────
  AdminListModerationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminListModeration.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/moderation/risky
            Method: GET

  # ─── Lambda: Admin Mark Safe (Phase 10) ──────────────────────────────────────
  AdminMarkSafeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminMarkSafe.handler
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/moderation/mark-safe
            Method: POST

  # ─── Lambda: Admin List Users (Admin Module) ─────────────────────────────────
  AdminListUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminListUsers.handler
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CloudVaultUserPool
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:ListUsers
              Resource: !GetAtt CloudVaultUserPool.Arn
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/users
            Method: GET

  # ─── Lambda: Admin Suspend/Activate User (Admin Module) ──────────────────────
  AdminSuspendUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminSuspendUser.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
      Events:
        SuspendEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/users/{userId}/suspend
            Method: POST
        ActivateEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/users/{userId}/activate
            Method: POST

  # ─── Lambda: Admin List Files (Admin Module) ─────────────────────────────────
  AdminListFilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminListFiles.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/files
            Method: GET

  # ─── Lambda: Admin Delete File (Admin Module) ────────────────────────────────
  AdminDeleteFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminDeleteFile.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
        - S3ReadPolicy:
            BucketName: !Ref StorageBucket
        - Statement:
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${StorageBucket}/*"
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/files/{userId}/{fileId}
            Method: DELETE

  # ─── Lambda: Admin Notify User ───────────────────────────────────────────────
  AdminNotifyUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminNotifyUser.handler
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CloudVaultUserPool
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
              Resource: !GetAtt CloudVaultUserPool.Arn
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/users/{userId}/notify
            Method: POST

  # ─── Lambda: Admin Set User Limits ───────────────────────────────────────────
  AdminSetUserLimitsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminSetUserLimits.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/users/{userId}/limits
            Method: POST

  # ─── Lambda: Get Notifications (user) ────────────────────────────────────────
  GetNotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/getNotifications.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /notifications
            Method: GET

  # ─── Lambda: Register User (post email-verify) ───────────────────────────────
  RegisterUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/registerUser.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /auth/register
            Method: POST

  # ─── Lambda: Get Account Status ──────────────────────────────────────────────
  GetAccountStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/getAccountStatus.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /auth/status
            Method: GET

  # ─── Lambda: Admin Approve/Deny User ─────────────────────────────────────────
  AdminApproveUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions/adminApproveUser.handler
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CloudVaultUserPool
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FileMetadataTable
        - DynamoDBWritePolicy:
            TableName: !Ref FileMetadataTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
              Resource: !GetAtt CloudVaultUserPool.Arn
      Events:
        ApproveEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/users/{userId}/approve
            Method: POST
        DenyEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref CloudVaultApi
            Path: /admin/users/{userId}/deny
            Method: POST


Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${CloudVaultApi}.execute-api.${AWS::Region}.amazonaws.com/"

  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref CloudVaultUserPool

  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref CloudVaultUserPoolClient
